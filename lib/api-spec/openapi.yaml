openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Node.js IDE API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: files
    description: File management
  - name: execute
    description: Code execution
  - name: typescript
    description: TypeScript language services
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List all files
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileEntry"
    post:
      operationId: createFile
      tags: [files]
      summary: Create a new file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileEntry"
        "409":
          description: File already exists

  /files/{filePath}:
    get:
      operationId: readFile
      tags: [files]
      summary: Read file content
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileContent"
        "404":
          description: Not found
    put:
      operationId: updateFile
      tags: [files]
      summary: Update file content
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found

  /files/{filePath}/rename:
    post:
      operationId: renameFile
      tags: [files]
      summary: Rename a file
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameInput"
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileEntry"
        "404":
          description: Not found
        "409":
          description: Destination already exists

  /execute:
    post:
      operationId: executeCode
      tags: [execute]
      summary: Execute a Node.js file and return output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteInput"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteResult"

  /ts/completions:
    post:
      operationId: getTsCompletions
      tags: [typescript]
      summary: Get TypeScript completions at a cursor position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TsCompletionInput"
      responses:
        "200":
          description: Completion items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TsCompletionResult"

  /ts/diagnostics:
    post:
      operationId: getTsDiagnostics
      tags: [typescript]
      summary: Get TypeScript diagnostics for a file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TsDiagnosticInput"
      responses:
        "200":
          description: Diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TsDiagnosticResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FileEntry:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        size:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - path
        - name
        - size
        - updatedAt

    FileContent:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
        - path
        - content

    FileInput:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
        - path

    FileUpdate:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    RenameInput:
      type: object
      properties:
        newPath:
          type: string
      required:
        - newPath

    DeleteResult:
      type: object
      properties:
        path:
          type: string
        deleted:
          type: boolean
      required:
        - path
        - deleted

    ExecuteInput:
      type: object
      properties:
        filePath:
          type: string
        stdin:
          type: string
      required:
        - filePath

    ExecuteResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exitCode:
          type: integer
        durationMs:
          type: integer
      required:
        - stdout
        - stderr
        - exitCode
        - durationMs

    TsCompletionInput:
      type: object
      properties:
        filePath:
          type: string
        content:
          type: string
        position:
          type: integer
          description: Character offset from start of file
      required:
        - filePath
        - content
        - position

    TsCompletionItem:
      type: object
      properties:
        label:
          type: string
        kind:
          type: string
        sortText:
          type: string
        detail:
          type: ["string", "null"]
        documentation:
          type: ["string", "null"]
      required:
        - label
        - kind
        - sortText

    TsCompletionResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TsCompletionItem"
      required:
        - items

    TsDiagnosticInput:
      type: object
      properties:
        filePath:
          type: string
        content:
          type: string
      required:
        - filePath
        - content

    TsDiagnosticItem:
      type: object
      properties:
        from:
          type: integer
        to:
          type: integer
        severity:
          type: string
        message:
          type: string
      required:
        - from
        - to
        - severity
        - message

    TsDiagnosticResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TsDiagnosticItem"
      required:
        - items
