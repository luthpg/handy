kind = "web"
previewPath = "/"
title = "Node.js IDE"
version = "1.0.0"
id = "artifacts/node-ide"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19164

[services.development]
run = "pnpm --filter @workspace/node-ide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/node-ide", "run", "build" ]
serve = "static"
publicDir = "artifacts/node-ide/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19164"
BASE_PATH = "/"
